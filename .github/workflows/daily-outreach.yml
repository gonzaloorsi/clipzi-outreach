name: Daily YouTube Outreach

on:
  # Schedule disabled 2026-05-02 — replaced by Vercel Cron at /api/cron/send
  # (runs hourly, multi-sender pool, writes to Neon). The new sender lives
  # in app/api/cron/send/route.ts and uses lib/sender-pool.ts.
  # Kept workflow_dispatch so we can still trigger the legacy script manually
  # via `gh workflow run daily-outreach.yml` if we ever need an emergency fallback.
  # schedule:
  #   - cron: '47 10 * * *'  # 7:47 AM ART (was the legacy daily run)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Run daily outreach
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_API_KEY_2: ${{ secrets.YOUTUBE_API_KEY_2 }}
          YOUTUBE_API_KEY_3: ${{ secrets.YOUTUBE_API_KEY_3 }}
          YOUTUBE_API_KEY_4: ${{ secrets.YOUTUBE_API_KEY_4 }}
          YOUTUBE_API_KEY_5: ${{ secrets.YOUTUBE_API_KEY_5 }}
          SENDER_EMAIL_2: ${{ secrets.SENDER_EMAIL_2 }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
        run: node legacy/daily-outreach.mjs
      
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Daily outreach: $(date +%Y-%m-%d)"
          git push
